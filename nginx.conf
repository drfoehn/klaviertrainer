# Nginx config for Klaviertrainer
# Place in /etc/nginx/sites-available/klaviertrainer
# Then: ln -s /etc/nginx/sites-available/klaviertrainer /etc/nginx/sites-enabled/
# and:  nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name klavier.deinserver.at;   # ← deine Domain anpassen

    # Redirect HTTP → HTTPS (nach certbot setup)
    # return 301 https://$host$request_uri;

    # File upload limit (PDFs bis 30 MB)
    client_max_body_size 31M;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Static uploads served directly by nginx (faster, bypasses Flask)
    # Uncomment if you want nginx to serve PDFs directly
    # location /uploads/ {
    #     alias /opt/klaviertrainer/uploads/;
    #     internal;  # only accessible via X-Accel-Redirect
    # }
}

